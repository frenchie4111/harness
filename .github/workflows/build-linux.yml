name: Build Linux

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # electron-builder needs these for AppImage assembly + native module
      # rebuilds on the runner. libnss3/libgbm1 keep Electron's sandbox
      # happy if anything tries to launch it during the build.
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 \
            libgbm1 \
            libasound2t64 \
            fakeroot \
            rpm

      # electron-vite@5's peer range rejects vite@7/8 under strict resolver;
      # --legacy-peer-deps mirrors the local dev install.
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Detect channel from the pushed tag (or assume stable for manual
      # dispatch / branch builds). vX.Y.Z-beta.N → beta channel, anything
      # else → latest. Drives the electron-builder --config.publish.channel
      # override and the YAML basename we attach to the release.
      - name: Detect release channel
        id: channel
        run: |
          REF="${GITHUB_REF}"
          if [[ "$REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "name=beta" >> "$GITHUB_OUTPUT"
            echo "yml=beta-linux.yml" >> "$GITHUB_OUTPUT"
          else
            echo "name=latest" >> "$GITHUB_OUTPUT"
            echo "yml=latest-linux.yml" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Linux packages
        run: |
          if [ "${{ steps.channel.outputs.name }}" = "beta" ]; then
            npm run dist:linux -- --config.publish.channel=beta
          else
            npm run dist:linux
          fi

      - name: Upload workflow artifact (branch / dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: harness-linux
          path: |
            release/Harness-*.AppImage
            release/Harness-*.deb
            release/${{ steps.channel.outputs.yml }}
          if-no-files-found: error

      - name: Attach to GitHub release (tag push)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            release/Harness-*.AppImage \
            release/Harness-*.deb \
            "release/${{ steps.channel.outputs.yml }}" \
            --clobber
